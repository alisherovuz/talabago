{% extends "base.html" %}
{% block title %}Kirish - TalabaGo Admin{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-purple-400">🎓 TalabaGo</h1>
            <p class="text-gray-400 mt-2">Admin Panel</p>
        </div>
        
        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded-lg mb-6">
            {{ error }}
        </div>
        {% endif %}
        
        <form method="POST" action="/login">
            <div class="mb-6">
                <label class="block text-gray-400 text-sm mb-2">Parol</label>
                <input type="password" name="password" 
                       class="w-full bg-gray-700 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-purple-500 transition"
                       placeholder="Admin parolini kiriting" required>
            </div>
            <button type="submit" 
                    class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-lg transition">
                <i class="fas fa-sign-in-alt mr-2"></i> Kirish
            </button>
        </form>
    </div>
</div>
{% endblock %}
